name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install Linting Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          npm install -g markdownlint-cli

      - name: Run Linters (make lint)
        run: make lint

      - name: Run Tests (make test)
        run: make test

      - name: Ensure Integrations are up-to-date
        run: |
          make build
          # If building creates a diff, the PR forgot to run make build and commit the result
          if ! git diff --exit-code; then
            echo "Error: Uncommitted changes detected after running 'make build'."
            echo "Please run './scripts/build-integrations.sh' locally and commit the generated integration files."
            exit 1
          fi
